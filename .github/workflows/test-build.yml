name: Test Build

on:
  push:
    branches:
      - "feature/*"
      - "fix/*"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install zip
        uses: montudor/action-zip@v1
      - name: Archive test build
        run: zip -qq -r auto-profile-picture-test.xpi .
        working-directory: src
      - name: Upload test build artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-profile-picture-test-${{ github.sha }}
          path: src/auto-profile-picture-test.xpi
          retention-days: 30
